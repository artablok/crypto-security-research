<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arta Blockchain Security Lab</title>

<style>

body{
font-family: Arial;
background:#0b0f1a;
color:white;
padding:40px;
}

h1{
color:#4da3ff;
}

table{
border-collapse:collapse;
width:100%;
margin-top:30px;
}

td,th{
border:1px solid #333;
padding:10px;
}

th{
background:#1b243b;
}

</style>
</head>

<body>

<h1>Arta Blockchain Security Lab</h1>

<p>
Public threat intelligence database for scam tokens.
</p>

<h2>Latest Detected Scam Tokens</h2>

<table id="scamTable">
<tr>
<th>Name</th>
<th>Symbol</th>
<th>Address</th>
<th>Type</th>
</tr>
</table>

<script>

fetch("https://raw.githubusercontent.com/artablok/crypto-security-research/main/database/solana.json")
.then(res => res.json())
.then(data => {

const tokens = data.scam_tokens.slice(-10).reverse()

tokens.forEach(t => {

const row = document.createElement("tr")

row.innerHTML = `
<td>${t.name}</td>
<td>${t.symbol}</td>
<td>${t.address}</td>
<td>${t.type}</td>
`

document.getElementById("scamTable").appendChild(row)

})

})

</script>

</body>
</html>
